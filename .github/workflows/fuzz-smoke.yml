name: Fuzz Smoke (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEUWERK_FUZZ_REQUIRED: "1"
      NEUWERK_FUZZ_SMOKE_RUNS: "250"
      NEUWERK_FUZZ_SEED: "1337"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install native fuzz build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev llvm-dev

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz harness compile check
        run: make fuzz.check

      - name: Fuzz smoke run
        run: make fuzz.smoke
