name: Image Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release tag/version to create or update
        required: true
        type: string
      target:
        description: Image target manifest id
        required: true
        default: ubuntu-24.04-amd64
        type: choice
        options:
          - ubuntu-24.04-amd64
      draft:
        description: Publish the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      runner:
        description: Runner label to use for the build
        required: true
        default: ubuntu-24.04
        type: string
      qemu_accelerator:
        description: qemu accelerator to pass to Packer
        required: true
        default: none
        type: choice
        options:
          - none
          - kvm

permissions:
  contents: write

concurrency:
  group: image-release-${{ inputs.target }}-${{ inputs.release_version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 300
    env:
      TARGET: ${{ inputs.target }}
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Resolve git revision
        id: git
        run: echo "revision=$(git rev-parse --short=12 HEAD)" >>"$GITHUB_OUTPUT"

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Cache vendored DPDK
        uses: actions/cache@v4
        with:
          path: |
            third_party/dpdk/src
            third_party/dpdk/build
            third_party/dpdk/install
          key: image-release-dpdk-${{ runner.os }}-${{ inputs.target }}-${{ hashFiles('third_party/dpdk/VERSION', 'scripts/build-dpdk.sh', 'packaging/scripts/build_dpdk.sh', 'packaging/targets/*.json', 'third_party/dpdk/patches/*.patch') }}

      - name: Install qemu host dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            genisoimage \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools \
            qemu-system-x86 \
            qemu-utils \
            xorriso \
            zstd

      - name: Validate image configuration
        run: make package.image.validate TARGET="$TARGET" PACKER=packer RELEASE_VERSION="$RELEASE_VERSION"

      - name: Build host artifacts
        run: |
          make dpdk.prepare
          bash packaging/scripts/build_firewall.sh --target "$TARGET" --profile release

      - name: Build qemu image
        run: |
          make package.image.build.qemu \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}" \
            PACKER=packer \
            QEMU_ACCELERATOR="${{ inputs.qemu_accelerator }}" \
            USE_PREBUILT_ARTIFACTS=true

      - name: Prepare GitHub release assets
        run: |
          make package.image.release-assets \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: Neuwerk ${{ inputs.release_version }} (${{ inputs.target }})
          body_path: artifacts/image-build/github-release/${{ inputs.target }}/release-notes.md
          files: |
            artifacts/image-build/github-release/${{ inputs.target }}/*
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
