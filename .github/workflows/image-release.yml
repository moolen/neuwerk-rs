name: Image Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release tag/version to create or update
        required: true
        type: string
      target:
        description: Appliance image target manifest id
        required: true
        default: ubuntu-24.04-amd64
        type: choice
        options:
          - ubuntu-24.04-amd64
          - ubuntu-24.04-minimal-amd64
      draft:
        description: Publish the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      runner:
        description: Runner label to use for the build
        required: true
        default: ubuntu-24.04
        type: string
      qemu_accelerator:
        description: qemu accelerator to pass to Packer
        required: true
        default: none
        type: choice
        options:
          - none
          - kvm

permissions:
  contents: write

concurrency:
  group: image-release-${{ inputs.target }}-${{ inputs.release_version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 300
    env:
      TARGET: ${{ inputs.target }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      PACKER_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/image-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: terraform-provider-neuwerk/go.mod
          cache-dependency-path: terraform-provider-neuwerk/go.sum

      - name: Resolve git revision
        id: git
        run: echo "revision=$(git rev-parse --short=12 HEAD)" >>"$GITHUB_OUTPUT"

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Cache vendored DPDK
        uses: actions/cache@v4
        with:
          path: |
            third_party/dpdk/src
            third_party/dpdk/build
            third_party/dpdk/install
          key: image-release-dpdk-${{ runner.os }}-${{ inputs.target }}-${{ hashFiles('third_party/dpdk/VERSION', 'scripts/build-dpdk.sh', 'packaging/scripts/build_dpdk.sh', 'packaging/targets/*.json', 'third_party/dpdk/patches/*.patch') }}

      - name: Install qemu host dependencies
        run: |
          packages=(
            genisoimage
            libclang-dev
            libnuma-dev
            llvm-dev
            meson
            ninja-build
            pkg-config
            protobuf-compiler
            python3-pyelftools
            qemu-system-x86
            qemu-utils
            xorriso
            zstd
          )
          if [[ "$TARGET" == "ubuntu-24.04-minimal-amd64" ]]; then
            packages+=(virtualbox)
          fi
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y "${packages[@]}"

      - name: Validate appliance image configuration
        run: make package.image.validate TARGET="$TARGET" PACKER=packer RELEASE_VERSION="$RELEASE_VERSION"

      - name: Build appliance host artifacts
        run: |
          make dpdk.prepare
          bash packaging/scripts/build_neuwerk.sh --target "$TARGET" --profile release

      - name: Test Terraform provider
        run: cd terraform-provider-neuwerk && go test ./...

      - name: Build Terraform provider release assets
        env:
          PROVIDER_DIR: terraform-provider-neuwerk
          PROVIDER_NAME: terraform-provider-neuwerk
        run: |
          bash packaging/scripts/build_terraform_provider_release_assets.sh \
            --provider-dir "$PROVIDER_DIR" \
            --provider-name "$PROVIDER_NAME" \
            --release-version "$RELEASE_VERSION" \
            --output-dir "$PWD/artifacts/terraform-provider-release"

      - name: Resolve qemu accelerator
        id: qemu
        run: |
          accelerator="${{ inputs.qemu_accelerator }}"
          if [[ "$accelerator" == "kvm" && ! -e /dev/kvm ]]; then
            echo "Requested qemu_accelerator=kvm but /dev/kvm is unavailable on this runner; falling back to none."
            accelerator="none"
          fi
          echo "accelerator=$accelerator" >>"$GITHUB_OUTPUT"

      - name: Build qemu image
        run: |
          make package.image.build.qemu \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}" \
            PACKER=packer \
            QEMU_ACCELERATOR="${{ steps.qemu.outputs.accelerator }}" \
            USE_PREBUILT_ARTIFACTS=true

      - name: Build Vagrant box release assets
        if: inputs.target == 'ubuntu-24.04-minimal-amd64'
        run: |
          metadata_name="neuwerk-${TARGET}-${RELEASE_VERSION}-virtualbox.metadata.json"
          box_name="neuwerk-${TARGET}-${RELEASE_VERSION}-virtualbox.box"
          release_base_url="https://github.com/${{ github.repository }}/releases/download/${RELEASE_VERSION}"
          make package.vagrant.box \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            VAGRANT_BOX_VERSION="${RELEASE_VERSION#v}" \
            VAGRANT_BOX_URL="${release_base_url}/${box_name}" \
            VAGRANT_METADATA_OUTPUT="${PACKER_ARTIFACT_DIR}/vagrant/${TARGET}/${metadata_name}"

      - name: Prepare appliance distribution assets
        run: |
          make package.image.release-assets \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}"

      - name: Publish GitHub appliance release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: Neuwerk ${{ inputs.release_version }} (${{ inputs.target }})
          body_path: artifacts/image-build/github-release/${{ inputs.target }}/release-notes.md
          files: |
            artifacts/image-build/github-release/${{ inputs.target }}/*
            artifacts/terraform-provider-release/*
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
