name: Image Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release tag/version to create or update
        required: true
        type: string
      target:
        description: Image target manifest id
        required: true
        default: ubuntu-24.04-amd64
        type: choice
        options:
          - ubuntu-24.04-amd64
      draft:
        description: Publish the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      runner:
        description: Runner label to use for the build
        required: true
        default: ubuntu-24.04
        type: string
      qemu_accelerator:
        description: qemu accelerator to pass to Packer
        required: true
        default: none
        type: choice
        options:
          - none
          - kvm

permissions:
  contents: write

concurrency:
  group: image-release-${{ inputs.target }}-${{ inputs.release_version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 300
    env:
      TARGET: ${{ inputs.target }}
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: terraform-provider-neuwerk/go.mod
          cache-dependency-path: terraform-provider-neuwerk/go.sum

      - name: Resolve git revision
        id: git
        run: echo "revision=$(git rev-parse --short=12 HEAD)" >>"$GITHUB_OUTPUT"

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Cache vendored DPDK
        uses: actions/cache@v4
        with:
          path: |
            third_party/dpdk/src
            third_party/dpdk/build
            third_party/dpdk/install
          key: image-release-dpdk-${{ runner.os }}-${{ inputs.target }}-${{ hashFiles('third_party/dpdk/VERSION', 'scripts/build-dpdk.sh', 'packaging/scripts/build_dpdk.sh', 'packaging/targets/*.json', 'third_party/dpdk/patches/*.patch') }}

      - name: Install qemu host dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            genisoimage \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools \
            qemu-system-x86 \
            qemu-utils \
            xorriso \
            zstd

      - name: Validate image configuration
        run: make package.image.validate TARGET="$TARGET" PACKER=packer RELEASE_VERSION="$RELEASE_VERSION"

      - name: Build host artifacts
        run: |
          make dpdk.prepare
          bash packaging/scripts/build_firewall.sh --target "$TARGET" --profile release

      - name: Test Terraform provider
        run: cd terraform-provider-neuwerk && go test ./...

      - name: Build Terraform provider release assets
        env:
          PROVIDER_DIR: terraform-provider-neuwerk
          PROVIDER_NAME: terraform-provider-neuwerk
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION#v}"
          asset_dir="$PWD/artifacts/terraform-provider-release"
          rm -rf "$asset_dir"
          mkdir -p "$asset_dir"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            bin_name="${PROVIDER_NAME}_v${version}${ext}"
            stage_dir="$(mktemp -d)"
            (
              cd "$PROVIDER_DIR"
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_VERSION}" \
                -o "${stage_dir}/${bin_name}" .
            )
            archive_name="${PROVIDER_NAME}_${version}_${goos}_${goarch}.zip"
            STAGE_DIR="$stage_dir" ASSET_DIR="$asset_dir" ARCHIVE_NAME="$archive_name" python3 - <<'PY'
            import os
            import pathlib
            import zipfile

            stage = pathlib.Path(os.environ["STAGE_DIR"])
            archive = pathlib.Path(os.environ["ASSET_DIR"]) / os.environ["ARCHIVE_NAME"]
            with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                for path in stage.iterdir():
                    zf.write(path, path.name)
            PY
            rm -rf "$stage_dir"
          done

          (
            cd "$asset_dir"
            sha256sum ./*.zip > "${PROVIDER_NAME}_${version}_SHA256SUMS"
          )

      - name: Resolve qemu accelerator
        id: qemu
        run: |
          accelerator="${{ inputs.qemu_accelerator }}"
          if [[ "$accelerator" == "kvm" && ! -e /dev/kvm ]]; then
            echo "Requested qemu_accelerator=kvm but /dev/kvm is unavailable on this runner; falling back to none."
            accelerator="none"
          fi
          echo "accelerator=$accelerator" >>"$GITHUB_OUTPUT"

      - name: Build qemu image
        run: |
          make package.image.build.qemu \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}" \
            PACKER=packer \
            QEMU_ACCELERATOR="${{ steps.qemu.outputs.accelerator }}" \
            USE_PREBUILT_ARTIFACTS=true

      - name: Prepare GitHub release assets
        run: |
          make package.image.release-assets \
            TARGET="$TARGET" \
            RELEASE_VERSION="$RELEASE_VERSION" \
            GIT_REVISION="${{ steps.git.outputs.revision }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: Neuwerk ${{ inputs.release_version }} (${{ inputs.target }})
          body_path: artifacts/image-build/github-release/${{ inputs.target }}/release-notes.md
          files: |
            artifacts/image-build/github-release/${{ inputs.target }}/*
            artifacts/terraform-provider-release/*
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
