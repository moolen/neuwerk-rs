name: CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: terraform-provider-neuwerk/go.mod
          cache-dependency-path: terraform-provider-neuwerk/go.sum

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run UI tests
        run: npm --prefix ui test

      - name: Build UI
        run: npm --prefix ui run build

      - name: Prepare vendored DPDK
        run: make dpdk.prepare

      - name: Export vendored DPDK environment
        run: |
          DPDK_VERSION=$(cat third_party/dpdk/VERSION)
          DPDK_INSTALL="$PWD/third_party/dpdk/install/$DPDK_VERSION"
          echo "DPDK_DIR=$DPDK_INSTALL" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$DPDK_INSTALL/lib/pkgconfig:$DPDK_INSTALL/lib/x86_64-linux-gnu/pkgconfig:$DPDK_INSTALL/lib64/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$DPDK_INSTALL/lib:$DPDK_INSTALL/lib/x86_64-linux-gnu:$DPDK_INSTALL/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build Neuwerk with all features
        run: cargo build --all-features

      - name: Run Terraform provider tests
        run: cd terraform-provider-neuwerk && go test ./...

      - name: Run Rust tests
        run: cargo test -- --test-threads=1

  integration-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Setup Kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run integration suite
        run: make test.integration

  terraform-provider-contract:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: terraform-provider-neuwerk/go.mod
          cache-dependency-path: terraform-provider-neuwerk/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            iproute2 \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Run Terraform provider contract suite
        run: |
          CARGO_BIN="${CARGO_HOME:-$HOME/.cargo}/bin/cargo"
          sudo --preserve-env=HOME,RUSTUP_HOME,CARGO_HOME \
            "$CARGO_BIN" test --test terraform_provider_e2e -- --test-threads=1

      - name: Restore workspace ownership for cache save
        if: always()
        run: |
          OWNER_UID="$(id -u)"
          OWNER_GID="$(id -g)"
          sudo chown -R "$OWNER_UID:$OWNER_GID" "$GITHUB_WORKSPACE"
          sudo chown -R "$OWNER_UID:$OWNER_GID" "${CARGO_HOME:-$HOME/.cargo}" "${RUSTUP_HOME:-$HOME/.rustup}"
