name: CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run UI tests
        run: npm --prefix ui test

      - name: Build UI
        run: npm --prefix ui run build

      - name: Prepare vendored DPDK
        run: make dpdk.prepare

      - name: Export vendored DPDK environment
        run: |
          DPDK_VERSION=$(cat third_party/dpdk/VERSION)
          DPDK_INSTALL="$PWD/third_party/dpdk/install/$DPDK_VERSION"
          echo "DPDK_DIR=$DPDK_INSTALL" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$DPDK_INSTALL/lib/pkgconfig:$DPDK_INSTALL/lib/x86_64-linux-gnu/pkgconfig:$DPDK_INSTALL/lib64/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$DPDK_INSTALL/lib:$DPDK_INSTALL/lib/x86_64-linux-gnu:$DPDK_INSTALL/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build firewall with all features
        run: cargo build --all-features

      - name: Run Rust tests
        run: cargo test -- --test-threads=1
