name: Fuzz Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: fuzz-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      NEUWERK_FUZZ_NIGHTLY_MAX_TIME: "900"
      NEUWERK_FUZZ_SEED: "1337"
      NEUWERK_FUZZ_NIGHTLY_SANITIZERS: "address undefined"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install native fuzz build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev llvm-dev

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz harness compile check
        run: make fuzz.check

      - name: Nightly fuzz run
        run: make fuzz.nightly
