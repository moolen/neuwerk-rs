name: E2E SSO Dex

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  e2e-sso-dex:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            llvm-dev \
            protobuf-compiler

      - name: Setup Go (for Dex build fallback)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Dex
        run: |
          ./scripts/setup-dex.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run SSO Dex integration suite
        env:
          DEX_BIN: ${{ runner.temp }}/bin/dex
          NEUWERK_SSO_REQUIRE_DEX: "1"
        run: make test.integration.sso
