name: CI Full Suite (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-full-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go (for Dex build fallback)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run UI tests
        run: npm --prefix ui test

      - name: Build UI
        run: npm --prefix ui run build

      - name: Export vendored DPDK environment
        run: |
          DPDK_VERSION=$(cat third_party/dpdk/VERSION)
          DPDK_INSTALL="$PWD/third_party/dpdk/install/$DPDK_VERSION"
          echo "DPDK_DIR=$DPDK_INSTALL" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$DPDK_INSTALL/lib/pkgconfig:$DPDK_INSTALL/lib/x86_64-linux-gnu/pkgconfig:$DPDK_INSTALL/lib64/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$DPDK_INSTALL/lib:$DPDK_INSTALL/lib/x86_64-linux-gnu:$DPDK_INSTALL/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run Rust full suite
        run: make test

      - name: Install Dex
        run: |
          ./scripts/setup-dex.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Integration suite
        run: make test.integration

      - name: Run SSO Dex integration suite
        env:
          DEX_BIN: ${{ runner.temp }}/bin/dex
          NEUWERK_SSO_REQUIRE_DEX: "1"
        run: make test.integration.sso
