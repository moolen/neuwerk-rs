name: CI Full Suite (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-full-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run strict Clippy
        run: make test.clippy

  full-suite:
    needs: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libnuma-dev \
            llvm-dev \
            meson \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            python3-pyelftools

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Go (for Dex build fallback)
        uses: actions/setup-go@v6
        with:
          # Dex source fallback may track newest Go directives.
          go-version: "stable"
          cache: false

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run UI tests
        run: npm --prefix ui test

      - name: Build UI
        run: npm --prefix ui run build

      - name: Run Rust full suite
        run: make test

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install Dex
        run: |
          bash ./scripts/setup-dex.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Integration suite
        run: make test.integration

      - name: Run SSO Dex integration suite
        env:
          DEX_BIN: ${{ runner.temp }}/bin/dex
          NEUWERK_SSO_REQUIRE_DEX: "1"
        run: make test.integration.sso
