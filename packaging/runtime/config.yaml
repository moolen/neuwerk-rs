# Canonical packaged Neuwerk runtime configuration.
# Edit this file and restart neuwerk.service after changes.
#
# Subsystem YAML paths are configured directly here, for example:
# - bootstrap.management_interface
# - bootstrap.data_interface
# - dns.upstreams
# - metrics.bind
# - integration.mode
# - dataplane.flow_incomplete_tcp_idle_timeout_secs

version: 1

bootstrap:
  management_interface: eth0
  data_interface: eth1
  data_plane_mode: dpdk

dns:
  upstreams:
    - 10.0.0.2:53
