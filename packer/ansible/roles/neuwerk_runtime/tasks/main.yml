- name: Ensure Neuwerk runtime root exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "/opt/neuwerk", mode: "0755" }
    - { path: "/opt/neuwerk/bin", mode: "0755" }
    - { path: "/opt/neuwerk/runtime", mode: "0755" }
    - { path: "/opt/neuwerk/ui", mode: "0755" }

- name: Ensure staged runtime files have restrictive permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/neuwerk/config.yaml", mode: "0644" }
    - { path: "/etc/systemd/system/neuwerk.service", mode: "0644" }
    - { path: "/opt/neuwerk/bin/neuwerk", mode: "0755" }

- name: Reload systemd units after staging runtime
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Enable Neuwerk service in image
  ansible.builtin.systemd_service:
    name: neuwerk.service
    enabled: true
